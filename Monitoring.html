<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Supervisor Live Monitor v12</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background: #f1f5f9; font-family: 'Plus Jakarta Sans', sans-serif; }
        .shift-column { background: rgba(255,255,255,0.6); border-radius: 20px; min-height: 400px; }
        .card-active { background: #fff; border-left: 5px solid #f59e0b; }
        .card-done { background: #fff; border-left: 5px solid #10b981; }
    </style>
</head>
<body class="p-4">
    <header class="max-w-7xl mx-auto flex justify-between items-center mb-8">
        <h1 class="text-2xl font-800 text-slate-800 uppercase tracking-tighter">Live<span class="text-emerald-500">Monitor</span></h1>
        <div class="text-right">
            <p id="todayDate" class="text-xs font-bold text-slate-500"></p>
            <button onclick="loadData()" class="text-[10px] font-black text-emerald-600 uppercase">Refresh System</button>
        </div>
    </header>

    <main class="max-w-7xl mx-auto space-y-8">
        <section>
            <h2 class="text-xs font-black text-slate-400 uppercase tracking-widest mb-4 ml-2">Sedang di Mixer (Antrian)</h2>
            <div id="activeCon" class="grid grid-cols-1 md:grid-cols-3 gap-4"></div>
        </section>

        <div class="grid grid-cols-1 lg:grid-cols-3 gap-6">
            <div class="shift-column p-4">
                <h2 class="text-center font-black text-slate-400 text-[10px] uppercase mb-4 tracking-widest">Shift 1 (Pagi)</h2>
                <div id="pagiCon" class="space-y-3"></div>
            </div>
            <div class="shift-column p-4">
                <h2 class="text-center font-black text-slate-400 text-[10px] uppercase mb-4 tracking-widest">Shift 2 (Siang)</h2>
                <div id="siangCon" class="space-y-3"></div>
            </div>
            <div class="shift-column p-4">
                <h2 class="text-center font-black text-slate-400 text-[10px] uppercase mb-4 tracking-widest">Shift 3 (Malam)</h2>
                <div id="malamCon" class="space-y-3"></div>
            </div>
        </div>
    </main>

    <script>
        const URL = "https://script.google.com/macros/s/AKfycbzI0mEdtG8UY77vhwfbpqE9K99f-9AM83pl-aDDRPKHg0qbQougyqTooUk8DJCNdTYU/exec";

        async function loadData() {
            const res = await fetch(URL);
            const data = await res.json();
            const mon = data.monitor;

            // 1. Render Active
            const act = document.getElementById('activeCon');
            act.innerHTML = mon.active.length === 0 ? '<p class="text-slate-400 text-xs italic ml-2">Tidak ada pakan di Mixer</p>' : '';
            mon.active.forEach(i => {
                act.innerHTML += `<div class="card-active p-4 rounded-2xl shadow-sm">
                    <div class="flex justify-between text-[9px] font-black uppercase text-amber-600 mb-2"><span>${i.operator}</span><span>${i.shift}</span></div>
                    <div class="font-bold text-slate-800 text-sm mb-2">${i.pens}</div>
                    <div class="text-right font-black text-lg">${Math.round(i.tonase)} <small class="text-[10px] text-slate-400 uppercase">kg</small></div>
                </div>`;
            });

            // 2. Render Per Shift
            const renderLog = (containerId, logs) => {
                const con = document.getElementById(containerId);
                con.innerHTML = logs.length === 0 ? '<p class="text-center text-[10px] text-slate-300 py-10">Belum ada data</p>' : '';
                logs.forEach(l => {
                    con.innerHTML += `<div class="card-done p-3 rounded-xl shadow-sm mb-2">
                        <div class="flex justify-between items-center">
                            <span class="font-bold text-xs text-slate-700">${l.pen}</span>
                            <span class="font-black text-emerald-600 text-xs">${Math.round(l.tonase)} kg</span>
                        </div>
                        <div class="flex justify-between text-[8px] font-bold text-slate-400 uppercase mt-1">
                            <span>${l.operator}</span>
                            <span>${new Date(l.waktu).toLocaleTimeString('id-ID', {hour:'2-digit', minute:'2-digit'})}</span>
                        </div>
                    </div>`;
                });
            };

            renderLog('pagiCon', mon.pagi);
            renderLog('siangCon', mon.siang);
            renderLog('malamCon', mon.malam);
        }

        document.getElementById('todayDate').innerText = new Date().toLocaleDateString('id-ID', { weekday: 'long', year: 'numeric', month: 'long', day: 'numeric' });
        window.onload = loadData;
        setInterval(loadData, 500); // Auto update 5 Detik
    </script>
</body>
</html>
