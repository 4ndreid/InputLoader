<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Supervisor Live Monitor v12 Premium</title>
<script src="https://cdn.tailwindcss.com"></script>

<style>
body {
    background:#f1f5f9;
    font-family:'Plus Jakarta Sans',sans-serif;
    overflow-x:hidden;
}
body::before {
    content:"";
    position:fixed;
    inset:0;
    background:
        radial-gradient(circle at 20% 20%,rgba(16,185,129,.12),transparent 30%),
        radial-gradient(circle at 80% 30%,rgba(245,158,11,.10),transparent 30%);
    animation:moveBg 12s linear infinite alternate;
    pointer-events:none;
    z-index:-1;
}
@keyframes moveBg {
    from {transform:translate(0,0) scale(1);}
    to {transform:translate(40px,40px) scale(1.08);}
}

.live-dots {display:flex;gap:10px;margin-left:14px;}
.live-dots span {
    width:12px;height:12px;border-radius:999px;background:#10b981;
    box-shadow:0 0 8px #10b981,0 0 18px rgba(16,185,129,.8);
    animation:liveDot 1.2s infinite ease-in-out;
}
.live-dots span:nth-child(2){animation-delay:.15s}
.live-dots span:nth-child(3){animation-delay:.3s}
.live-dots span:nth-child(4){animation-delay:.45s;opacity:.35}
@keyframes liveDot {
    0%,100%{transform:scale(.65);opacity:.35}
    50%{transform:scale(1.15);opacity:1}
}

.panel {
    background:rgba(255,255,255,.75);
    backdrop-filter:blur(12px);
    border:1px solid rgba(255,255,255,.8);
    border-radius:22px;
    box-shadow:0 16px 40px rgba(15,23,42,.07);
}

.refresh-btn {
    background:linear-gradient(135deg,#10b981,#059669);
    color:white;
    border-radius:999px;
    padding:9px 18px;
    font-size:10px;
    font-weight:900;
    text-transform:uppercase;
    box-shadow:0 0 14px rgba(16,185,129,.55);
}
.dark-btn {
    background:#0f172a;
    color:white;
    border-radius:999px;
    padding:9px 18px;
    font-size:10px;
    font-weight:900;
    text-transform:uppercase;
}
button:active {transform:scale(.95);}

.shift-column {
    background:rgba(255,255,255,.62);
    backdrop-filter:blur(12px);
    border-radius:24px;
    min-height:400px;
    border:1px solid rgba(255,255,255,.8);
    box-shadow:0 20px 50px rgba(15,23,42,.05);
}

.card-hover {transition:all .25s ease;}
.card-hover:hover {
    transform:translateY(-5px) scale(1.015);
    box-shadow:0 18px 35px rgba(15,23,42,.14);
}

.card-active {
    background:#fff;
    border-left:5px solid #f59e0b;
    box-shadow:0 0 12px rgba(245,158,11,.45),0 10px 25px rgba(15,23,42,.08);
}

.scan-line {position:relative;overflow:hidden;}
.scan-line::before {
    content:"";
    position:absolute;
    left:-50%;
    top:0;
    width:50%;
    height:100%;
    background:linear-gradient(90deg,transparent,rgba(255,255,255,.45),transparent);
    animation:scanMove 2.6s linear infinite;
    z-index:3;
    pointer-events:none;
}
@keyframes scanMove {
    0%{left:-60%}
    100%{left:120%}
}

.electric-done {
    position:relative;
    border-radius:16px;
    padding:2px;
    overflow:hidden;
    background:transparent;
}
.electric-done::before {
    content:"";
    position:absolute;
    inset:-80px;
    background:conic-gradient(
        transparent 0deg,
        transparent 70deg,
        #10b981 100deg,
        #34d399 135deg,
        #6ee7b7 165deg,
        #10b981 195deg,
        transparent 260deg,
        transparent 360deg
    );
    animation:spinGreen 2.2s linear infinite;
}
.electric-done::after {
    content:"";
    position:absolute;
    inset:2px;
    border-radius:14px;
    background:#fff;
    box-shadow:0 0 8px rgba(16,185,129,.55),0 0 16px rgba(16,185,129,.28);
}
.electric-done > * {position:relative;z-index:2;}
@keyframes spinGreen {
    from{transform:rotate(0deg)}
    to{transform:rotate(360deg)}
}

.progress-track {
    width:100%;
    height:5px;
    background:#e2e8f0;
    border-radius:999px;
    overflow:hidden;
    margin-top:8px;
}
.progress-bar {
    height:100%;
    border-radius:999px;
    background:linear-gradient(90deg,#10b981,#34d399);
    box-shadow:0 0 10px rgba(16,185,129,.8);
}

.pulse-live {animation:pulseLive 1.8s ease-in-out infinite;}
@keyframes pulseLive {
    0%,100%{transform:scale(1);opacity:1}
    50%{transform:scale(1.04);opacity:.88}
}

.badge-new {
    background:#f97316;
    color:white;
    font-size:8px;
    font-weight:900;
    padding:3px 7px;
    border-radius:999px;
    box-shadow:0 0 10px rgba(249,115,22,.7);
    animation:pulseLive 1s infinite;
}
.status-online {color:#059669;}
.status-loading {color:#f59e0b;}
.status-error {color:#dc2626;}

.mini-badge {
    background:rgba(16,185,129,.12);
    color:#059669;
    border:1px solid rgba(16,185,129,.25);
    border-radius:999px;
    padding:3px 9px;
}
</style>
</head>

<body class="p-4">

<header class="max-w-7xl mx-auto flex flex-col lg:flex-row justify-between gap-4 mb-8">
    <div class="flex items-center">
        <h1 class="text-2xl font-black text-slate-800 uppercase tracking-tighter">
            Live<span class="text-emerald-500">Monitor</span>
        </h1>
        <div class="live-dots">
            <span></span><span></span><span></span><span></span>
        </div>
    </div>

    <div class="panel p-4 flex flex-col lg:flex-row gap-3 items-end lg:items-center">
        <div class="text-right">
            <p id="todayDate" class="text-xs font-bold text-slate-500"></p>
            <p id="lastUpdated" class="text-[10px] font-black text-slate-400 uppercase">Last Updated: -</p>
            <p id="apiStatus" class="text-[10px] font-black uppercase status-loading">● Checking API</p>
        </div>
        <button onclick="loadData(true)" class="refresh-btn">Refresh System</button>
        <button onclick="toggleFullscreen()" class="dark-btn">Fullscreen</button>
    </div>
</header>

<main class="max-w-7xl mx-auto space-y-6">

    <section class="grid grid-cols-2 lg:grid-cols-4 gap-4">
        <div class="panel p-4">
            <p class="text-[10px] font-black text-slate-400 uppercase">Antrian Aktif</p>
            <div id="sumActive" class="text-3xl font-black text-orange-500">0</div>
        </div>
        <div class="panel p-4">
            <p class="text-[10px] font-black text-slate-400 uppercase">Total Selesai</p>
            <div id="sumDone" class="text-3xl font-black text-emerald-600">0</div>
        </div>
        <div class="panel p-4">
            <p class="text-[10px] font-black text-slate-400 uppercase">Total KG</p>
            <div id="sumKg" class="text-3xl font-black text-slate-800">0</div>
        </div>
        <div class="panel p-4">
            <p class="text-[10px] font-black text-slate-400 uppercase">Data Baru</p>
            <div id="sumNew" class="text-3xl font-black text-orange-500">0</div>
        </div>
    </section>

    <section class="panel p-4 flex flex-col lg:flex-row gap-3">
        <select id="filterShift" onchange="applyFilters()" class="p-3 rounded-xl font-bold text-sm bg-white">
            <option value="ALL">SEMUA SHIFT</option>
            <option value="Pagi">SHIFT 1 PAGI</option>
            <option value="Siang">SHIFT 2 SIANG</option>
            <option value="Malam">SHIFT 3 MALAM</option>
        </select>

        <input id="filterOperator" oninput="applyFilters()" placeholder="Cari operator..."
            class="p-3 rounded-xl font-bold text-sm bg-white flex-1">

        <button onclick="resetFilters()" class="dark-btn">Reset Filter</button>
    </section>

    <section>
        <h2 class="text-xs font-black text-slate-400 uppercase tracking-widest mb-4 ml-2">
            Sedang di Mixer (Antrian)
        </h2>
        <div id="activeCon" class="grid grid-cols-1 md:grid-cols-3 gap-4"></div>
    </section>

    <div class="grid grid-cols-1 lg:grid-cols-3 gap-6">
        <div class="shift-column p-4">
            <h2 class="text-center font-black text-slate-400 text-[10px] uppercase mb-4 tracking-widest">Shift 1 (Pagi)</h2>
            <div id="pagiCon" class="space-y-3"></div>
        </div>
        <div class="shift-column p-4">
            <h2 class="text-center font-black text-slate-400 text-[10px] uppercase mb-4 tracking-widest">Shift 2 (Siang)</h2>
            <div id="siangCon" class="space-y-3"></div>
        </div>
        <div class="shift-column p-4">
            <h2 class="text-center font-black text-slate-400 text-[10px] uppercase mb-4 tracking-widest">Shift 3 (Malam)</h2>
            <div id="malamCon" class="space-y-3"></div>
        </div>
    </div>
</main>

<script>
const URL = "https://script.google.com/macros/s/AKfycbzI0mEdtG8UY77vhwfbpqE9K99f-9AM83pl-aDDRPKHg0qbQougyqTooUk8DJCNdTYU/exec";

let RAW_MON = null;
let LAST_ACTIVE_KEY = "";

function setStatus(type, text) {
    const el = document.getElementById("apiStatus");
    el.className = "text-[10px] font-black uppercase";
    if (type === "online") el.classList.add("status-online");
    if (type === "loading") el.classList.add("status-loading");
    if (type === "error") el.classList.add("status-error");
    el.innerText = text;
}

function beep() {
    try {
        const ctx = new (window.AudioContext || window.webkitAudioContext)();
        const osc = ctx.createOscillator();
        const gain = ctx.createGain();
        osc.frequency.value = 880;
        gain.gain.value = 0.04;
        osc.connect(gain);
        gain.connect(ctx.destination);
        osc.start();
        osc.stop(ctx.currentTime + 0.12);
    } catch(e) {}
}

function isRecent(waktu) {
    if (!waktu) return false;
    const diff = Date.now() - new Date(waktu).getTime();
    return diff >= 0 && diff <= 5 * 60 * 1000;
}

function progressPercent(value) {
    return Math.min((value / 6000) * 100, 100);
}

function animateValue(el, end, duration = 700) {
    const start = Number(el.dataset.value || 0);
    const startTime = performance.now();

    function update(now) {
        const progress = Math.min((now - startTime) / duration, 1);
        const value = Math.floor(start + (end - start) * progress);
        el.innerText = value;
        if (progress < 1) requestAnimationFrame(update);
        else {
            el.dataset.value = end;
            el.innerText = end;
        }
    }
    requestAnimationFrame(update);
}

function updateSummary(mon) {
    const allDone = [...mon.pagi, ...mon.siang, ...mon.malam];
    const totalKg = allDone.reduce((a,b) => a + (Number(b.tonase) || 0), 0);
    const newCount = allDone.filter(x => isRecent(x.waktu)).length;

    document.getElementById("sumActive").innerText = mon.active.length;
    document.getElementById("sumDone").innerText = allDone.length;
    document.getElementById("sumKg").innerText = Math.round(totalKg);
    document.getElementById("sumNew").innerText = newCount;
}

function currentFilters() {
    return {
        shift: document.getElementById("filterShift").value,
        operator: document.getElementById("filterOperator").value.toLowerCase().trim()
    };
}

function matchOperator(item, filter) {
    if (!filter) return true;
    return String(item.operator || "").toLowerCase().includes(filter);
}

function applyFilters() {
    if (!RAW_MON) return;
    renderDashboard(RAW_MON);
}

function resetFilters() {
    document.getElementById("filterShift").value = "ALL";
    document.getElementById("filterOperator").value = "";
    applyFilters();
}

function renderDashboard(mon) {
    const filters = currentFilters();

    updateSummary(mon);

    const activeCon = document.getElementById("activeCon");
    let active = mon.active.filter(x => matchOperator(x, filters.operator));
    if (filters.shift !== "ALL") active = active.filter(x => x.shift === filters.shift);

    activeCon.innerHTML = active.length === 0
        ? '<p class="text-slate-400 text-xs italic ml-2">Tidak ada pakan di Mixer</p>'
        : '';

    active.forEach(i => {
        const tonase = Math.round(i.tonase || 0);
        const pct = progressPercent(tonase);

        activeCon.innerHTML += `
            <div class="card-active card-hover scan-line p-4 rounded-2xl">
                <div class="flex justify-between text-[9px] font-black uppercase text-amber-600 mb-2">
                    <span>${i.operator}</span>
                    <span>${i.shift}</span>
                </div>
                <div class="font-bold text-slate-800 text-sm mb-2">${i.pens}</div>
                <div class="text-right font-black text-lg text-orange-500 pulse-live">
                    <span class="counter" data-target="${tonase}">0</span>
                    <small class="text-[10px] text-slate-400 uppercase">kg</small>
                </div>
                <div class="progress-track">
                    <div class="progress-bar" style="width:${pct}%"></div>
                </div>
            </div>`;
    });

    const renderLog = (containerId, logs, shiftName) => {
        const con = document.getElementById(containerId);

        let filtered = logs.filter(x => matchOperator(x, filters.operator));
        if (filters.shift !== "ALL" && filters.shift !== shiftName) filtered = [];

        con.innerHTML = filtered.length === 0
            ? '<p class="text-center text-[10px] text-slate-300 py-10">Belum ada data</p>'
            : '';

        filtered.forEach(l => {
            const tonase = Math.round(l.tonase || 0);
            const pct = progressPercent(tonase);
            const recent = isRecent(l.waktu);

            con.innerHTML += `
                <div class="electric-done card-hover mb-2">
                    <div class="p-3 rounded-xl scan-line">
                        <div class="flex justify-between items-center">
                            <div class="flex items-center gap-2">
                                <span class="font-bold text-xs text-slate-700">${l.pen}</span>
                                ${recent ? '<span class="badge-new">BARU</span>' : ''}
                            </div>
                            <span class="font-black text-emerald-600 text-xs pulse-live">
                                <span class="counter" data-target="${tonase}">0</span> kg
                            </span>
                        </div>
                        <div class="flex justify-between text-[8px] font-bold text-slate-400 uppercase mt-1">
                            <span class="mini-badge">${l.operator}</span>
                            <span>${new Date(l.waktu).toLocaleTimeString('id-ID', {hour:'2-digit', minute:'2-digit'})}</span>
                        </div>
                        <div class="progress-track">
                            <div class="progress-bar" style="width:${pct}%"></div>
                        </div>
                    </div>
                </div>`;
        });
    };

    renderLog("pagiCon", mon.pagi, "Pagi");
    renderLog("siangCon", mon.siang, "Siang");
    renderLog("malamCon", mon.malam, "Malam");

    document.querySelectorAll(".counter").forEach(el => {
        animateValue(el, Number(el.dataset.target));
    });
}

async function loadData(manual = false) {
    try {
        setStatus("loading", "● Loading Data");

        const res = await fetch(URL);
        const data = await res.json();
        const mon = data.monitor;

        const activeKey = JSON.stringify((mon.active || []).map(x => `${x.pens}-${x.tonase}-${x.shift}`));
        if (LAST_ACTIVE_KEY && activeKey !== LAST_ACTIVE_KEY) beep();
        LAST_ACTIVE_KEY = activeKey;

        RAW_MON = mon;
        renderDashboard(mon);

        document.getElementById("lastUpdated").innerText =
            "Last Updated: " + new Date().toLocaleTimeString("id-ID", {hour:"2-digit", minute:"2-digit", second:"2-digit"});

        setStatus("online", "● API Online");
    } catch (err) {
        setStatus("error", "● API Error");
        console.error(err);
        if (manual) alert("Gagal mengambil data. Cek koneksi atau URL API.");
    }
}

function toggleFullscreen() {
    if (!document.fullscreenElement) {
        document.documentElement.requestFullscreen();
    } else {
        document.exitFullscreen();
    }
}

document.getElementById("todayDate").innerText = new Date().toLocaleDateString("id-ID", {
    weekday:"long",
    year:"numeric",
    month:"long",
    day:"numeric"
});

window.onload = loadData;
setInterval(loadData, 60000);
</script>

</body>
</html>
