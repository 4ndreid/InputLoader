<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
    <title>MIXER DIST v11.5</title>

    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&display=swap" rel="stylesheet">

    <style>
        body { background: #fdfdfd; color: #1a1a1a; font-family: 'Plus Jakarta Sans', sans-serif; }

        .glass-card {
            background: #ffffff;
            border: 1px solid #f1f5f9;
            border-radius: 35px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.03);
        }

        .btn-orange {
            background: linear-gradient(135deg, #f97316, #ea580c);
            box-shadow: 0 10px 20px rgba(234, 88, 12, 0.2);
        }

        .glow-refresh {
            border: 2px solid #f97316;
            color: #f97316;
            border-radius: 9999px;
            background: transparent;
            letter-spacing: 2px;
            transition: 0.3s;
            box-shadow: 
                0 0 5px #f97316,
                0 0 10px #f97316,
                0 0 20px #f97316,
                0 0 40px rgba(249,115,22,0.6);
        }

        .glow-refresh:hover {
            background: #f97316;
            color: #000;
        }

        /* ⚡ ELECTRIC MUTER ORANGE */
        .electric-border {
            position: relative;
            border-radius: 20px;
            padding: 2px;
            overflow: hidden;
            background: transparent;
        }

        .electric-border::before {
            content: "";
            position: absolute;
            inset: -80px;
            background: conic-gradient(
                transparent 0deg,
                transparent 70deg,
                #f97316 100deg,
                #fb923c 130deg,
                #f97316 160deg,
                #ea580c 190deg,
                transparent 250deg,
                transparent 360deg
            );
            animation: spinOrange 2s linear infinite;
        }

        .electric-border::after {
            content: "";
            position: absolute;
            inset: 2px;
            border-radius: 18px;
            background: #f8fafc;
            box-shadow:
                0 0 8px rgba(249,115,22,.6),
                0 0 18px rgba(249,115,22,.4),
                inset 0 0 6px rgba(249,115,22,.2);
        }

        .electric-border > * {
            position: relative;
            z-index: 2;
        }

        @keyframes spinOrange {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
    </style>
</head>

<body class="p-6 max-w-lg mx-auto pb-28">

<header class="flex justify-between items-center mb-8 pt-4">
    <h1 class="text-2xl font-extrabold tracking-tighter text-slate-900 uppercase">
        MIXER<span class="text-orange-500 italic">FEED</span>
    </h1>
    <div id="clock" class="text-xs font-bold bg-orange-100 text-orange-600 px-4 py-2 rounded-full">00:00</div>
</header>

<div class="space-y-6">

    <div class="glass-card p-7">
        <h2 class="text-center text-[10px] uppercase font-black text-slate-400 tracking-widest mb-6">
            Antrian Aktif
        </h2>
        <div id="antCon" class="space-y-3"></div>
    </div>

    <div id="conf" class="hidden glass-card p-8 border-t-[10px] border-orange-500">

        <div class="electric-border mb-8">
            <select id="opSel"
                class="w-full bg-slate-50 p-5 rounded-2xl text-sm font-bold appearance-none border-none outline-none">
            </select>
        </div>

        <div id="stopBox" class="mb-10 text-center">
            <button id="btnStop"
                onclick="stopMix()"
                class="w-full btn-orange text-white font-black py-6 rounded-2xl text-xl">
                STOP MIXING
            </button>
        </div>

        <div id="detCon" class="space-y-3 mb-10 hidden"></div>

        <div class="bg-slate-900 p-8 rounded-[35px] text-center shadow-xl">
            <span class="text-[9px] text-slate-500 block uppercase font-black tracking-widest mb-2">
                Total Muatan
            </span>
            <div id="totalT" class="text-5xl font-black text-white">0</div>
            <span class="text-xs font-bold text-orange-500 uppercase mt-1 block italic">KG</span>
        </div>

        <button onclick="location.reload()"
            class="w-full mt-10 py-4 text-[11px] font-black uppercase text-center glow-refresh">
            Refresh
        </button>

    </div>
</div>

<script>
const URL = "https://script.google.com/macros/s/AKfycbzI0mEdtG8UY77vhwfbpqE9K99f-9AM83pl-aDDRPKHg0qbQougyqTooUk8DJCNdTYU/exec";
let DB = null;
let ITEM = null;

async function init() {
    const res = await fetch(URL);
    DB = await res.json();

    const op = document.getElementById('opSel');
    op.innerHTML = '<option disabled selected>PILIH OPERATOR</option>';

    DB.users.forEach(u => op.innerHTML += `<option value="${u}">${u}</option>`);

    const con = document.getElementById('antCon');
    con.innerHTML = DB.antrian.length === 0 ? '<p class="text-center text-emerald-500 py-10 font-bold text-xs uppercase">KOSONG ✅</p>' : '';

    DB.antrian.forEach(i => {
        const wrap = document.createElement('div');
        wrap.className = "electric-border cursor-pointer";

        wrap.innerHTML = `
            <div class="p-5 bg-slate-50 rounded-2xl">
                <div class="flex justify-between items-center">
                    <div>
                        <div class="text-[9px] text-slate-400 font-bold uppercase">${i.shift}</div>
                        <div class="font-extrabold text-slate-700">${i.pen}</div>
                    </div>
                    <div class="text-2xl font-black text-orange-500">
                        ${Math.round(i.tonase)} KG
                    </div>
                </div>
            </div>
        `;

        wrap.onclick = () => {
            ITEM = i;
            document.getElementById('conf').classList.remove('hidden');
            document.getElementById('totalT').innerText = Math.round(i.tonase);

            if (i.jamStop) {
                showDist();
            } else {
                document.getElementById('stopBox').classList.remove('hidden');
                document.getElementById('detCon').classList.add('hidden');
            }

            window.scrollTo({
                top: document.body.scrollHeight,
                behavior: 'smooth'
            });
        };

        con.appendChild(wrap);
    });
}

async function stopMix() {
    const b = document.getElementById('btnStop');
    b.disabled = true;
    b.innerText = "MENYIMPAN...";

    await fetch(URL, {
        method: 'POST',
        body: JSON.stringify({
            formType: "stopMixing",
            sourceRow: ITEM.row
        })
    });

    showDist();
}

function showDist() {
    document.getElementById('stopBox').classList.add('hidden');

    const dc = document.getElementById('detCon');
    dc.classList.remove('hidden');
    dc.innerHTML = '';

    ITEM.pen.split(",").forEach((p, idx) => {
        const pName = p.trim();
        const target = DB.masterDist[pName] ? DB.masterDist[pName][ITEM.shift] : 0;
        const saved = localStorage.getItem(`v115_${ITEM.row}_${pName}`);

        dc.innerHTML += `
        <div class="flex items-center gap-2">
            <div class="flex-1 p-5 bg-slate-50 rounded-2xl">
                <span class="text-xs font-bold">${pName}</span>
                <b class="block text-xl">${Math.round(target)} KG</b>
            </div>

            <div class="electric-border">
                <button id="btn-save-${idx}"
                    ${saved ? 'disabled' : ''}
                    onclick="saveDist('${pName}', ${Math.round(target)}, ${idx})"
                    class="w-20 ${saved ? 'bg-emerald-500' : 'btn-orange'} text-white font-black py-5 rounded-2xl text-[10px] uppercase">
                    ${saved ? 'OK' : 'SIMPAN'}
                </button>
            </div>
        </div>`;
    });
}

async function saveDist(pName, ton, idx) {
    const op = document.getElementById('opSel').value;
    if (!op || op.includes("PILIH")) return alert("Pilih Operator!");

    const b = document.getElementById(`btn-save-${idx}`);
    b.disabled = true;
    b.innerText = "...";

    await fetch(URL, {
        method: 'POST',
        body: JSON.stringify({
            formType: "distribusi",
            sourceRow: ITEM.row,
            operator: op,
            shift: ITEM.shift,
            pen: pName,
            tonase: ton
        })
    });

    b.className = "w-20 bg-emerald-500 text-white font-black py-5 rounded-2xl text-[10px]";
    b.innerText = "OK";

    localStorage.setItem(`v115_${ITEM.row}_${pName}`, "true");
}

setInterval(() => {
    document.getElementById('clock').innerText =
        new Date().toLocaleTimeString('id-ID', {
            hour:'2-digit',
            minute:'2-digit'
        }).replace(':', '.');
}, 1000);

window.onload = init;
</script>

</body>
</html>
