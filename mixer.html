<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Distribusi TMR Mixer</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style> body { font-family: 'Poppins', sans-serif; } </style>
</head>
<body class="bg-gray-100 min-h-screen text-gray-800 pb-10">

    <div class="bg-blue-600 text-white p-4 shadow-md sticky top-0 z-20 flex justify-between items-center">
        <div>
            <h1 class="text-xl font-bold">Distribusi TMR</h1>
            <p class="text-xs text-blue-100">Panel Operator Mixer</p>
        </div>
        <button onclick="fetchPendingMixes()" class="p-2 bg-blue-500 hover:bg-blue-700 rounded-full transition">
            <svg class="w-5 h-5 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 4v5h.582m15.356 2A8.001 8.001 0 004.582 9m0 0H9m11 11v-5h-.581m0 0a8.003 8.003 0 01-15.357-2m15.357 2H15"></path></svg>
        </button>
    </div>

    <div class="max-w-md mx-auto mt-6 px-4">
        
        <div class="flex justify-between items-center mb-4">
            <h2 class="text-sm font-bold text-gray-500 uppercase tracking-wider">Antrean Distribusi</h2>
            <span id="badge-count" class="bg-blue-100 text-blue-800 text-xs font-semibold px-2.5 py-0.5 rounded-full">0 Pakan</span>
        </div>

        <div id="mix-list" class="space-y-4">
            <p class="text-center text-sm text-gray-400 mt-10 animate-pulse">Menarik data antrean...</p>
        </div>

    </div>

    <script>
        // GANTI DENGAN URL APPS SCRIPT ANDA YANG SAMA (Pastikan sudah "Versi Baru")
        const scriptURL = 'https://script.google.com/macros/s/AKfycbwGbcKGY4vgTG6_y686uovBSWSZQvMKRpLGLu2aw4Qup6CJGDYN6qji3WPLb152rhFl/exec';
        
        // Dijalankan saat web dibuka
        window.addEventListener('DOMContentLoaded', fetchPendingMixes);

        async function fetchPendingMixes() {
            const listContainer = document.getElementById('mix-list');
            listContainer.innerHTML = `<p class="text-center text-sm text-gray-400 mt-10 flex justify-center items-center"><svg class="animate-spin -ml-1 mr-3 h-5 w-5 text-blue-500" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24"><circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle><path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"></path></svg>Memuat data...</p>`;
            
            try {
                // Menarik data dengan parameter action=getPendingMixes
                const response = await fetch(scriptURL + '?action=getPendingMixes', { method: 'GET', redirect: 'follow' });
                const data = await response.json();

                if (data.result === 'success') {
                    renderCards(data.data);
                } else {
                    throw new Error("Gagal mengambil data");
                }
            } catch (error) {
                listContainer.innerHTML = `<div class="bg-red-50 text-red-500 p-4 rounded-lg text-center text-sm border border-red-200">Gagal terhubung ke server. Pastikan koneksi internet stabil.</div>`;
            }
        }

        function renderCards(mixes) {
            const listContainer = document.getElementById('mix-list');
            document.getElementById('badge-count').innerText = `${mixes.length} Pakan`;
            
            if (mixes.length === 0) {
                listContainer.innerHTML = `
                <div class="bg-green-50 border border-green-200 p-6 rounded-xl text-center shadow-sm">
                    <svg class="mx-auto h-12 w-12 text-green-400 mb-2" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 12l2 2 4-4m6 2a9 9 0 11-18 0 9 9 0 0118 0z"></path></svg>
                    <p class="text-gray-700 font-semibold">Semua Beres!</p>
                    <p class="text-xs text-gray-500">Tidak ada pakan yang menunggu didistribusikan saat ini.</p>
                </div>`;
                return;
            }

            listContainer.innerHTML = '';
            
            mixes.forEach(mix => {
                // Ekstrak jam dari Waktu Input
                let jamSaja = mix.waktu;
                if(mix.waktu.includes(', ')) { jamSaja = mix.waktu.split(', ')[1]; }

                const card = document.createElement('div');
                card.className = 'bg-white border rounded-xl p-4 shadow-sm relative overflow-hidden transition';
                card.id = `card-${mix.row}`;
                card.innerHTML = `
                    <div class="absolute left-0 top-0 bottom-0 w-1.5 bg-blue-500"></div>
                    <div class="flex justify-between items-start mb-2 ml-2">
                        <span class="bg-blue-50 text-blue-700 text-xs font-bold px-2 py-1 rounded">Shift ${mix.shift}</span>
                        <span class="text-xs text-gray-400 flex items-center">
                            <svg class="w-3 h-3 mr-1" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 8v4l3 3m6-3a9 9 0 11-18 0 9 9 0 0118 0z"></path></svg>
                            ${jamSaja}
                        </span>
                    </div>
                    <div class="ml-2 mb-4">
                        <h3 class="text-sm font-bold text-gray-800 mb-1 leading-tight">${mix.pen}</h3>
                        <p class="text-xs text-gray-500">Total Tonase Akhir: <span class="font-bold text-gray-800">${mix.tonaseAkhir}</span></p>
                    </div>
                    <button onclick="tandaiDistribusi(${mix.row})" id="btn-${mix.row}" class="w-full bg-blue-600 hover:bg-blue-700 text-white font-semibold py-2 px-4 rounded-lg focus:outline-none transition text-sm flex justify-center items-center shadow-sm">
                        Tandai Sudah Distribusi
                    </button>
                `;
                listContainer.appendChild(card);
            });
        }

        function tandaiDistribusi(rowNumber) {
            // Konfirmasi keamanan agar tidak salah pencet
            if(!confirm("Apakah pakan ini benar-benar sudah didistribusikan ke kandang?")) return;

            const btn = document.getElementById(`btn-${rowNumber}`);
            btn.innerHTML = `<svg class="animate-spin -ml-1 mr-2 h-4 w-4 text-white" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24"><circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle><path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"></path></svg> Memproses...`;
            btn.disabled = true;
            btn.classList.replace('bg-blue-600', 'bg-blue-400');

            let formData = new FormData();
            formData.append('action', 'updateStatus');
            formData.append('rowNumber', rowNumber);

            fetch(scriptURL, { method: 'POST', body: formData })
                .then(response => response.json())
                .then(data => {
                    if(data.result === 'success') {
                        // Hilangkan card dari layar dengan animasi halus
                        const card = document.getElementById(`card-${rowNumber}`);
                        card.style.opacity = '0';
                        setTimeout(() => fetchPendingMixes(), 300); // Tarik data ulang
                    } else {
                        throw new Error(data.error);
                    }
                })
                .catch(error => {
                    alert("Gagal merubah status: " + error.message);
                    btn.innerHTML = "Coba Lagi";
                    btn.disabled = false;
                    btn.classList.replace('bg-blue-400', 'bg-blue-600');
                });
        }
    </script>
</body>
</html>
