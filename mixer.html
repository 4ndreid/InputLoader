<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Distribusi TMR Mixer - PT Bumi Rojo Koyo</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style> body { font-family: 'Poppins', sans-serif; } </style>
</head>
<body class="bg-gray-100 min-h-screen text-gray-800 pb-10">

    <div class="bg-blue-600 text-white p-4 shadow-md sticky top-0 z-20 flex justify-between items-center">
        <div>
            <h1 class="text-xl font-bold">Distribusi TMR</h1>
            <p class="text-xs text-blue-100">Panel Operator Mixer</p>
        </div>
        <button onclick="fetchPendingMixes()" class="p-2 bg-blue-500 hover:bg-blue-700 rounded-full transition">
            <svg class="w-5 h-5 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 4v5h.582m15.356 2A8.001 8.001 0 004.582 9m0 0H9m11 11v-5h-.581m0 0a8.003 8.003 0 01-15.357-2m15.357 2H15"></path></svg>
        </button>
    </div>

    <div class="max-w-md mx-auto mt-6 px-4">
        
        <div class="flex justify-between items-center mb-4">
            <h2 class="text-sm font-bold text-gray-500 uppercase tracking-wider">Antrean Distribusi</h2>
            <span id="badge-count" class="bg-blue-100 text-blue-800 text-xs font-semibold px-2.5 py-0.5 rounded-full">0 Pakan</span>
        </div>

        <div id="mix-list" class="space-y-4">
            <p class="text-center text-sm text-gray-400 mt-10 animate-pulse">Menarik data antrean...</p>
        </div>

    </div>

    <script>
        // GANTI DENGAN URL APPS SCRIPT ANDA
        const scriptURL = 'https://script.google.com/macros/s/AKfycbyA6haGpV8gJ0fO7WO0649Wil2Tnj4fHYQT09V-JrVSXZm5ovE_nP5aqZ5P7eDQMqc_/exec';
        
        // Simpan waktu per baris secara lokal (agar tidak hilang saat geser menu)
        let timeLog = {};

        window.addEventListener('DOMContentLoaded', fetchPendingMixes);

        async function fetchPendingMixes() {
            const listContainer = document.getElementById('mix-list');
            listContainer.innerHTML = `<p class="text-center text-sm text-gray-400 mt-10 flex justify-center items-center"><svg class="animate-spin -ml-1 mr-3 h-5 w-5 text-blue-500" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24"><circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle><path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"></path></svg>Memuat data...</p>`;
            
            try {
                const response = await fetch(scriptURL + '?action=getPendingMixes', { method: 'GET', redirect: 'follow' });
                const data = await response.json();

                if (data.result === 'success') {
                    renderCards(data.data);
                } else {
                    throw new Error("Gagal mengambil data");
                }
            } catch (error) {
                listContainer.innerHTML = `<div class="bg-red-50 text-red-500 p-4 rounded-lg text-center text-sm border border-red-200">Gagal terhubung ke server.</div>`;
            }
        }

        function renderCards(mixes) {
            const listContainer = document.getElementById('mix-list');
            document.getElementById('badge-count').innerText = `${mixes.length} Pakan`;
            
            if (mixes.length === 0) {
                listContainer.innerHTML = `
                <div class="bg-green-50 border border-green-200 p-6 rounded-xl text-center shadow-sm">
                    <p class="text-gray-700 font-semibold">Semua Beres!</p>
                </div>`;
                return;
            }

            listContainer.innerHTML = '';
            
            mixes.forEach(mix => {
                let jamSaja = mix.waktu.includes(', ') ? mix.waktu.split(', ')[1] : mix.waktu;

                const card = document.createElement('div');
                card.className = 'bg-white border rounded-xl p-4 shadow-sm relative overflow-hidden transition mb-4';
                card.id = `card-${mix.row}`;
                card.innerHTML = `
                    <div class="absolute left-0 top-0 bottom-0 w-1.5 bg-blue-500"></div>
                    <div class="flex justify-between items-start mb-2 ml-2">
                        <span id="badge-status-${mix.row}" class="bg-orange-100 text-orange-700 text-[10px] font-bold px-2 py-0.5 rounded uppercase">Waiting</span>
                        <span class="text-[10px] text-gray-400 flex items-center">
                            <i class="fas fa-clock mr-1"></i> ${jamSaja}
                        </span>
                    </div>
                    <div class="ml-2 mb-4">
                        <h3 class="text-sm font-bold text-gray-800 mb-1">${mix.pen}</h3>
                        <p class="text-xs text-gray-500 font-medium">Target Tonase: <span class="text-blue-600">${mix.tonaseAkhir} kg</span></p>
                    </div>

                    <div class="ml-2 space-y-2">
                        <button id="btn-start-${mix.row}" onclick="handleStartMix(${mix.row})" class="w-full bg-blue-600 hover:bg-blue-700 text-white font-bold py-3 rounded-lg text-xs transition shadow-sm">
                            <i class="fas fa-play mr-2"></i>MULAI ADUK
                        </button>

                        <button id="btn-stop-${mix.row}" onclick="handleStopMix(${mix.row})" class="hidden w-full bg-yellow-500 hover:bg-yellow-600 text-white font-bold py-3 rounded-lg text-xs transition shadow-sm">
                            <i class="fas fa-stop mr-2"></i>SELESAI ADUK (STOP)
                        </button>

                        <button id="btn-dist-${mix.row}" onclick="handleFinishDist(${mix.row})" class="hidden w-full bg-green-600 hover:bg-green-700 text-white font-bold py-3 rounded-lg text-xs transition shadow-sm">
                            <i class="fas fa-check-double mr-2"></i>SELESAI DISTRIBUSI
                        </button>
                    </div>
                `;
                listContainer.appendChild(card);
            });
        }

        // LOGIKA PROSES
        function handleStartMix(row) {
            timeLog[row] = { start: new Date() };
            
            document.getElementById(`btn-start-${row}`).classList.add('hidden');
            document.getElementById(`btn-stop-${row}`).classList.remove('hidden');
            
            const badge = document.getElementById(`badge-status-${row}`);
            badge.innerText = "Mixing...";
            badge.className = "bg-blue-100 text-blue-700 text-[10px] font-bold px-2 py-0.5 rounded uppercase";
        }

        function handleStopMix(row) {
            timeLog[row].stop = new Date();
            
            // Hitung durasi mixing (detik ke menit)
            let diff = Math.round((timeLog[row].stop - timeLog[row].start) / 60000);
            alert("Mesin Berhenti. Waktu aduk: " + diff + " menit. Silakan distribusi ke kandang.");

            document.getElementById(`btn-stop-${row}`).classList.add('hidden');
            document.getElementById(`btn-dist-${row}`).classList.remove('hidden');
            
            const badge = document.getElementById(`badge-status-${row}`);
            badge.innerText = "OTW Kandang";
            badge.className = "bg-yellow-100 text-yellow-700 text-[10px] font-bold px-2 py-0.5 rounded uppercase";
        }

        function handleFinishDist(row) {
            if(!confirm("Pakan sudah habis didistribusikan?")) return;

            const btn = document.getElementById(`btn-dist-${row}`);
            btn.disabled = true;
            btn.innerHTML = `<i class="fas fa-spinner fa-spin mr-2"></i>Menyimpan...`;

            const finishTime = new Date();

            let formData = new FormData();
            formData.append('action', 'updateStatusComplex'); // Pastikan fungsi ini ada di Code.gs
            formData.append('rowNumber', row);
            formData.append('startTime', timeLog[row].start.toISOString());
            formData.append('stopTime', timeLog[row].stop.toISOString());
            formData.append('finishTime', finishTime.toISOString());

            fetch(scriptURL, { method: 'POST', body: formData })
                .then(res => res.json())
                .then(data => {
                    if(data.result === 'success') {
                        const card = document.getElementById(`card-${row}`);
                        card.style.opacity = '0';
                        setTimeout(() => fetchPendingMixes(), 300);
                    } else {
                        throw new Error(data.error);
                    }
                })
                .catch(err => {
                    alert("Gagal simpan: " + err.message);
                    btn.disabled = false;
                    btn.innerHTML = `<i class="fas fa-check-double mr-2"></i>SELESAI DISTRIBUSI`;
                });
        }
    </script>
</body>
</html>
