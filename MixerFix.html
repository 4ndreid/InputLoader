<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
    <title>MIXER DIST v11.5</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&display=swap" rel="stylesheet">
    <style>
        body { background: #fdfdfd; color: #1a1a1a; font-family: 'Plus Jakarta Sans', sans-serif; }
        .glass-card { background: #ffffff; border: 1px solid #f1f5f9; border-radius: 35px; box-shadow: 0 10px 30px rgba(0,0,0,0.03); }
        .btn-orange { background: linear-gradient(135deg, #f97316, #ea580c); box-shadow: 0 10px 20px rgba(234, 88, 12, 0.2); }
    </style>
</head>
<body class="p-6 max-w-lg mx-auto pb-28">
    <header class="flex justify-between items-center mb-8 pt-4">
        <h1 class="text-2xl font-extrabold tracking-tighter text-slate-900 uppercase">MIXER<span class="text-orange-500 italic">FEED</span></h1>
        <div id="clock" class="text-xs font-bold bg-orange-100 text-orange-600 px-4 py-2 rounded-full">00:00</div>
    </header>

    <div class="space-y-6">
        <div class="glass-card p-7">
            <h2 class="text-center text-[10px] uppercase font-black text-slate-400 tracking-widest mb-6">Antrian Aktif</h2>
            <div id="antCon" class="space-y-3"></div>
        </div>

        <div id="conf" class="hidden glass-card p-8 border-t-[10px] border-orange-500 animate-pulse-once">
            <select id="opSel" class="w-full bg-slate-50 p-5 rounded-2xl text-sm font-bold mb-8 appearance-none border-none"></select>
            
            <div id="stopBox" class="mb-10 text-center">
                <button id="btnStop" onclick="stopMix()" class="w-full btn-orange text-white font-black py-6 rounded-2xl text-xl tracking-tight active:scale-95 transition-all">STOP MIXING</button>
            </div>

            <div id="detCon" class="space-y-3 mb-10 hidden"></div>

            <div class="bg-slate-900 p-8 rounded-[35px] text-center shadow-xl">
                <span class="text-[9px] text-slate-500 block uppercase font-black tracking-widest mb-2">Total Muatan</span>
                <div id="totalT" class="text-5xl font-black text-white tabular-nums">0</div>
                <span class="text-xs font-bold text-orange-500 uppercase mt-1 block italic tracking-widest">KG</span>
            </div>
            
            <button onclick="location.reload()" class="w-full mt-10 py-2 text-slate-300 text-[10px] font-black uppercase text-center">Refresh</button>
        </div>
    </div>

    <script>
        const URL = "https://script.google.com/macros/s/AKfycbzH5fpkCC8CtS1kwFQ6fxAl3UkprU6klPIyC0X6uLwvCthRP7ddjDtuE8qiejGavjYq/exec";
        let DB = null; let ITEM = null;
        async function init() {
            const res = await fetch(URL); DB = await res.json();
            const op = document.getElementById('opSel'); op.innerHTML = '<option disabled selected>PILIH OPERATOR</option>';
            DB.users.forEach(u => op.innerHTML += `<option value="${u}">${u}</option>`);
            const con = document.getElementById('antCon'); con.innerHTML = DB.antrian.length === 0 ? '<p class="text-center text-emerald-500 py-10 font-bold text-xs uppercase">KOSONG ✅</p>' : '';
            DB.antrian.forEach(i => {
                const d = document.createElement('div'); d.className = "p-5 bg-slate-50 rounded-2xl cursor-pointer border border-transparent hover:border-orange-200 transition-all";
                d.innerHTML = `<div class="flex justify-between items-center"><div><div class="text-[9px] text-slate-400 font-bold uppercase mb-1">${i.shift}</div><div class="font-extrabold text-slate-700 text-base">${i.pen}</div></div><div class="text-2xl font-black text-orange-500">${Math.round(i.tonase)} <span class="text-[10px] text-slate-300 font-bold">KG</span></div></div>`;
                d.onclick = () => { ITEM = i; document.getElementById('conf').classList.remove('hidden'); document.getElementById('totalT').innerText = Math.round(i.tonase); if(i.jamStop && i.jamStop !== "") showDist(); else { document.getElementById('stopBox').classList.remove('hidden'); document.getElementById('detCon').classList.add('hidden'); } window.scrollTo({ top: document.body.scrollHeight, behavior: 'smooth' }); };
                con.appendChild(d);
            });
        }
        async function stopMix() {
            const b = document.getElementById('btnStop'); b.disabled = true; b.innerText = "MENYIMPAN...";
            await fetch(URL, { method: 'POST', body: JSON.stringify({ formType: "stopMixing", sourceRow: ITEM.row }) }); showDist();
        }
        function showDist() {
            document.getElementById('stopBox').classList.add('hidden'); const dc = document.getElementById('detCon'); dc.classList.remove('hidden'); dc.innerHTML = '';
            ITEM.pen.split(",").forEach((p, idx) => {
                const pName = p.trim(); const target = DB.masterDist[pName] ? DB.masterDist[pName][ITEM.shift] : 0;
                const saved = localStorage.getItem(`v115_${ITEM.row}_${pName}`);
                dc.innerHTML += `<div class="flex items-center gap-2"><div class="flex-1 flex justify-between items-center p-5 bg-slate-50 rounded-2xl">
                    <span class="text-xs font-bold text-slate-600">${pName}</span>
                    <b class="text-slate-800 text-xl font-black">${Math.round(target)} <small class="text-[9px] text-slate-400 font-bold uppercase">KG</small></b>
                </div><button id="btn-save-${idx}" ${saved?'disabled':''} onclick="saveDist('${pName}', ${Math.round(target)}, ${idx})" class="w-20 ${saved?'bg-emerald-500':'btn-orange'} text-white font-black py-5 rounded-2xl text-[10px] uppercase shadow-lg">${saved?'OK':'SIMPAN'}</button></div>`;
            });
        }
        async function saveDist(pName, ton, idx) {
            const op = document.getElementById('opSel').value; if(!op || op.includes("PILIH")) return alert("Pilih Operator!");
            const b = document.getElementById(`btn-save-${idx}`); b.disabled = true; b.innerText = "...";
            await fetch(URL, { method: 'POST', body: JSON.stringify({ formType: "distribusi", sourceRow: ITEM.row, operator: op, shift: ITEM.shift, pen: pName, tonase: ton }) });
            b.className = "w-20 bg-emerald-500 text-white font-black py-5 rounded-2xl text-[10px]"; b.innerText = "OK";
            localStorage.setItem(`v115_${ITEM.row}_${pName}`, "true");
        }
        setInterval(() => { document.getElementById('clock').innerText = new Date().toLocaleTimeString('id-ID', {hour:'2-digit', minute:'2-digit'}).replace(':', '.'); }, 1000);
        window.onload = init;
    </script>
</body>
</html>
