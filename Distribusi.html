<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
    <title>MIXER v9.9</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background: #0c0a09; color: #fafaf9; font-family: 'Inter', sans-serif; }
        .card { background: rgba(41, 37, 36, 0.6); backdrop-filter: blur(10px); border: 1px solid rgba(255,255,255,0.05); border-radius: 28px; }
        .btn-orange { background: linear-gradient(135deg, #f97316, #ea580c); }
        .btn-ok { background: #15803d !important; }
    </style>
</head>
<body class="p-4 max-w-md mx-auto pb-24">
    <header class="flex justify-between items-center mb-8 pt-4">
        <h1 class="text-2xl font-black text-orange-500 italic">MIXER<span class="text-white not-italic">FEED</span></h1>
        <div id="clock" class="text-xs font-mono bg-orange-500/10 text-orange-400 px-3 py-1 rounded-full border border-orange-500/20">00:00</div>
    </header>

    <div class="space-y-6">
        <div class="card p-6">
            <h2 class="text-center text-[10px] uppercase font-black text-stone-500 tracking-widest mb-4">Antrian Pencurahan</h2>
            <div id="antCon" class="space-y-3"></div>
        </div>

        <div id="conf" class="hidden card p-6 border-t-4 border-orange-500 animate-in fade-in slide-in-from-bottom-4 duration-500">
            <select id="opSel" class="w-full bg-stone-900 border border-stone-700 p-4 rounded-2xl text-sm font-bold mb-6 appearance-none text-orange-500"></select>
            
            <div id="stopBox" class="mb-8">
                <button id="btnStop" onclick="stopMix()" class="w-full btn-orange text-white font-black py-6 rounded-2xl shadow-xl active:scale-95 text-xl tracking-tighter">STOP MIXING</button>
                <p class="text-center text-[10px] text-stone-500 mt-2 italic font-medium tracking-tight">Tekan tepat saat putaran mixer berhenti</p>
            </div>

            <div id="detCon" class="space-y-4 mb-8 hidden"></div>

            <div class="bg-stone-900 p-6 rounded-3xl text-center border border-white/5 shadow-inner">
                <span class="text-[9px] text-stone-500 block uppercase font-black tracking-widest mb-1">Net Weight (Mixer)</span>
                <div id="totalT" class="text-5xl font-black text-orange-500 tracking-tighter">0</div>
                <span class="text-[10px] font-bold text-stone-600 uppercase">Kilogram</span>
            </div>
            
            <button onclick="location.reload()" class="w-full mt-8 py-3 text-stone-500 text-[10px] font-black uppercase tracking-[0.3em] hover:text-white transition-colors">Refresh System</button>
        </div>
    </div>

    <script>
        const URL = "https://script.google.com/macros/s/AKfycbxr8WsQjjNzfSLVeZA07aVWoOO2nkcqVhIjub2L1WIbqL9zUdDcfcN2fj_98jT9i3JK/exec";
        let DB = null; let ITEM = null;

        async function init() {
            const res = await fetch(URL); DB = await res.json();
            const op = document.getElementById('opSel');
            op.innerHTML = '<option disabled selected>-- PILIH NAMA OPERATOR --</option>';
            DB.users.forEach(u => op.innerHTML += `<option value="${u}">${u}</option>`);

            const con = document.getElementById('antCon');
            con.innerHTML = DB.antrian.length === 0 ? '<p class="text-center text-emerald-500 py-6 font-black tracking-widest text-xs">ALL CLEAR ✅</p>' : '';
            DB.antrian.forEach(i => {
                const d = document.createElement('div');
                d.className = "p-5 rounded-3xl bg-stone-900 border border-white/5 cursor-pointer hover:border-orange-500 transition-all";
                d.innerHTML = `<div class="flex justify-between items-center"><div><div class="text-[9px] text-stone-500 font-black uppercase mb-1 tracking-widest">${i.shift}</div><div class="font-black text-white text-base">${i.pen}</div></div><div class="text-2xl font-black text-orange-500">${Math.round(i.tonase)} <span class="text-[10px] text-stone-600">KG</span></div></div>`;
                d.onclick = () => {
                    ITEM = i; document.getElementById('conf').classList.remove('hidden');
                    document.getElementById('totalT').innerText = Math.round(i.tonase);
                    if(i.jamStop && i.jamStop !== "") showDist();
                    else { document.getElementById('stopBox').classList.remove('hidden'); document.getElementById('detCon').classList.add('hidden'); }
                };
                con.appendChild(d);
            });
        }

        async function stopMix() {
            const b = document.getElementById('btnStop'); b.disabled = true; b.innerText = "...";
            await fetch(URL, { method: 'POST', body: JSON.stringify({ formType: "stopMixing", sourceRow: ITEM.row }) });
            showDist();
        }

        function showDist() {
            document.getElementById('stopBox').classList.add('hidden');
            const dc = document.getElementById('detCon'); dc.classList.remove('hidden'); dc.innerHTML = '';
            ITEM.pen.split(",").forEach((p, idx) => {
                const pName = p.trim();
                const target = DB.masterDist[pName] ? DB.masterDist[pName][ITEM.shift] : 0;
                const saved = localStorage.getItem(`v99_${ITEM.row}_${pName}`);
                dc.innerHTML += `<div class="flex items-center gap-3">
                    <div class="flex-1 flex justify-between items-center p-4 bg-stone-900 rounded-2xl border border-white/5">
                        <span class="text-xs font-black text-stone-200">${pName}</span>
                        <b class="text-orange-500 text-lg">${Math.round(target)} <small class="text-[9px] text-stone-600 uppercase">KG</small></b>
                    </div>
                    <button id="btn-save-${idx}" ${saved?'disabled':''} onclick="saveDist('${pName}', ${Math.round(target)}, ${idx})" class="${saved?'btn-ok':'btn-orange'} font-black px-6 py-5 rounded-2xl text-[10px] uppercase shadow-lg shadow-orange-900/20">${saved?'DONE':'SAVE'}</button>
                </div>`;
            });
        }

        async function saveDist(pName, ton, idx) {
            const op = document.getElementById('opSel').value; if(!op || op.includes("--")) return alert("Pilih Operator!");
            const b = document.getElementById(`btn-save-${idx}`); b.disabled = true; b.innerText = "...";
            const p = { formType: "distribusi", sourceRow: ITEM.row, operator: op, shift: ITEM.shift, pen: pName, tonase: ton };
            await fetch(URL, { method: 'POST', body: JSON.stringify(p) });
            b.className = "btn-ok font-black px-6 py-5 rounded-2xl text-[10px]"; b.innerText = "DONE";
            localStorage.setItem(`v99_${ITEM.row}_${pName}`, "true");
        }

        setInterval(() => { const n = new Date(); document.getElementById('clock').innerText = n.getHours().toString().padStart(2,'0') + ":" + n.getMinutes().toString().padStart(2,'0'); }, 1000);
        window.onload = init;
    </script>
</body>
</html>
