<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
    <title>TMR LOADER v11.5</title>
    <link rel="icon" type="image/png" href="logo.png">
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700;800;900&display=swap" rel="stylesheet">
    <style>
        :root { --green:#067a46; --dark:#064e3b; --soft:#eefdf5; }
        * { box-sizing: border-box; }
        body {
            margin: 0;
            background: #f7f8f7;
            color: #111827;
            font-family: 'Plus Jakarta Sans', sans-serif;
        }
        .app-shell { max-width: 1100px; margin: 0 auto; padding-bottom: 26px; }
        .topbar {
            background: #fff;
            box-shadow: 0 10px 25px rgba(0,0,0,.08);
            padding: 26px 34px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            gap: 18px;
            position: sticky;
            top: 0;
            z-index: 20;
        }
        .brand { display: flex; align-items: center; gap: 16px; min-width: 0; }
        .logo-img {
            width: 76px;
            height: 76px;
            object-fit: contain;
            flex: 0 0 auto;
        }
        .brand-title {
            font-size: clamp(1.7rem, 6vw, 3.2rem);
            line-height: .9;
            font-weight: 900;
            letter-spacing: -2px;
            white-space: nowrap;
        }
        .brand-title .loader { color: #078344; font-style: italic; }
        .version-badge {
            display: inline-flex;
            align-items: center;
            margin-left: 10px;
            padding: 5px 10px;
            border-radius: 9px;
            background: linear-gradient(135deg, #0f9f5c, #04743f);
            color: #fff;
            font-size: .48em;
            letter-spacing: 0;
            vertical-align: middle;
        }
        #clock {
            background: linear-gradient(135deg, #0f9f5c, #04743f);
            color: white;
            font-weight: 900;
            font-size: clamp(1.1rem, 4vw, 2.2rem);
            padding: 14px 28px;
            border-radius: 13px;
            box-shadow: 0 12px 24px rgba(6,122,70,.25);
            white-space: nowrap;
        }
        .content { padding: 30px 34px 0; display: grid; gap: 20px; }
        .glass-card {
            background: #ffffff;
            border: 1px solid #eef2f0;
            border-radius: 24px;
            box-shadow: 0 12px 28px rgba(0,0,0,.08);
        }
        .select-card { padding: 26px; display: grid; gap: 22px; }
        .select-wrap {
            border: 2px solid #067a46;
            border-radius: 12px;
            min-height: 100px;
            display: grid;
            grid-template-columns: 70px 1fr 30px;
            align-items: center;
            padding: 12px 24px;
            background: #fff;
        }
        .select-icon { font-size: 36px; color: #067a46; text-align: center; }
        .select-label { display: block; font-size: 1rem; font-weight: 900; color: #6b7280; text-transform: uppercase; margin-bottom: 6px; }
        .neo-input {
            width: 100%;
            border: none;
            outline: none;
            background: transparent;
            font-size: clamp(1.25rem, 4vw, 2rem);
            font-weight: 900;
            color: #111827;
            appearance: none;
        }
        .arrow { width: 0; height: 0; border-left: 10px solid transparent; border-right: 10px solid transparent; border-top: 12px solid #067a46; justify-self: end; }
        .pen-card { padding: 28px 30px; }
        .section-head { display:flex; align-items:center; justify-content:space-between; gap:14px; margin-bottom:22px; }
        .section-title { font-size: clamp(1.4rem, 4vw, 2rem); font-weight: 900; letter-spacing: -.5px; }
        #pCount { background: linear-gradient(135deg, #0f9f5c, #04743f); color:white; min-width: 92px; text-align:center; padding: 9px 18px; border-radius: 10px; font-size: 1.7rem; font-weight: 900; }
        #pCon {
            display: grid;
            grid-template-columns: repeat(5, minmax(0, 1fr));
            gap: 16px 18px;
            max-height: none;
            overflow: visible;
        }
        .pen-box {
            position: relative;
            min-height: 110px;
            border: 2px solid #087b48;
            border-radius: 12px;
            background: #fff;
            display:flex;
            flex-direction:column;
            align-items:center;
            justify-content:center;
            cursor:pointer;
            transition:.18s ease;
            user-select:none;
        }
        .pen-box:hover { transform: translateY(-2px); box-shadow: 0 8px 20px rgba(6,122,70,.12); }
        .pen-box input { position:absolute; opacity:0; pointer-events:none; }
        .pen-number { font-size: 2.4rem; font-weight: 900; line-height:1; }
        .pen-name { margin-top:8px; font-size: 1.1rem; font-weight: 900; }
        .pen-status { margin-top:8px; font-size:.7rem; font-weight:900; text-transform:uppercase; }
        .pen-box:has(input:checked) { background:#ecfdf5; box-shadow: inset 0 0 0 4px rgba(16,185,129,.18); }
        .pen-done-1x { background:#fff8dc !important; border-color:#f59e0b !important; }
        .pen-locked-2x { background:#fff1f2 !important; border-color:#ef4444 !important; opacity:.55; cursor:not-allowed; }
        .pen-disabled-limit { opacity:.35; filter:grayscale(1); }
        .legend { display:flex; flex-wrap:wrap; gap:18px 28px; margin-top:22px; color:#6b7280; font-size:1rem; font-weight:700; }
        .legend span::before { content:""; display:inline-block; width:22px; height:22px; border:2px solid #087b48; border-radius:3px; margin-right:9px; vertical-align:-5px; }
        .legend .l-1x::before { border-color:#f59e0b; background:#fffbeb; }
        .legend .l-2x::before { border-color:#ef4444; background:#fff1f2; }
        .legend .l-off::before { border-color:#9ca3af; background:#f3f4f6; }
        .target-panel {
            background: linear-gradient(145deg, #0b8a50, #064e3b);
            color:white;
            border-radius: 18px;
            padding: 24px 26px;
            box-shadow: 0 14px 26px rgba(6,78,59,.20);
        }
        .target-main-title { text-align:center; text-transform:uppercase; font-size:clamp(1.6rem, 5vw, 2.2rem); font-weight:900; margin-bottom:20px; }
        .target-grid { display:grid; grid-template-columns: repeat(5, 1fr); gap: 12px; align-items:stretch; }
        .target-item { text-align:center; padding: 12px 8px; border-right:1px solid rgba(255,255,255,.32); }
        .target-item:last-child { border-right:none; }
        .target-label { display:block; font-size:.9rem; font-weight:900; text-transform:uppercase; margin-bottom:10px; opacity:.95; }
        .target-val { font-size: clamp(2.1rem, 8vw, 4.6rem); font-weight:900; line-height:1; color:#fff; text-shadow:0 4px 10px rgba(0,0,0,.18); }
        .target-unit { display:block; margin-top:10px; font-weight:900; opacity:.8; }
        .input-card { padding: 24px 26px; }
        .input-head { display:flex; justify-content:space-between; align-items:center; margin-bottom:16px; gap:16px; }
        .reset-btn { border:none; background:linear-gradient(135deg, #0f9f5c, #04743f); color:#fff; padding:12px 18px; border-radius:10px; font-weight:900; cursor:pointer; }
        .actual-grid { display:grid; grid-template-columns: repeat(3, 1fr); gap:18px; }
        .actual-box { border:2px solid #087b48; border-radius:12px; padding:16px; background:white; }
        .actual-box label { display:block; color:#6b7280; font-size:1rem; font-weight:900; text-transform:uppercase; margin-bottom:12px; }
        .actual-box input { width:100%; border:2px solid #087b48; border-radius:9px; min-height:62px; padding:0 18px; font-size:1.4rem; font-weight:900; outline:none; }
        .molases-total { display:flex; justify-content:space-between; align-items:center; margin-top:18px; padding:16px 20px; border-radius:14px; background:#0b1f1a; color:white; font-weight:900; }
        #m-h { font-size:2rem; }
        #btn { width:100%; border:none; border-radius:14px; background:linear-gradient(135deg, #11965a, #04743f); color:white; padding:24px; font-size:clamp(1.35rem, 4vw, 2rem); font-weight:900; box-shadow:0 12px 25px rgba(6,122,70,.25); cursor:pointer; transition:.18s; }
        #btn:active { transform:scale(.98); }
        #btn:disabled { opacity:.65; cursor:wait; }
        .hidden-inputs { display:none; }
        @media (max-width: 760px) {
            .topbar { padding: 16px 18px; }
            .logo-img { width: 56px; height: 56px; }
            .brand { gap: 10px; }
            .content { padding: 22px 16px 0; }
            .select-card, .pen-card, .input-card { padding: 20px; }
            .select-wrap { grid-template-columns: 48px 1fr 24px; min-height: 78px; padding: 10px 14px; }
            .select-icon { font-size: 26px; }
            #pCon { grid-template-columns: repeat(2, minmax(0,1fr)); gap: 14px; }
            .pen-box { min-height: 92px; }
            .target-grid { grid-template-columns: repeat(2, 1fr); }
            .target-item { border-right:none; border-bottom:1px solid rgba(255,255,255,.22); }
            .actual-grid { grid-template-columns: 1fr; }
            .version-badge { margin-left: 4px; }
        }


        /* MODE MOBILE COMPACT - ukuran diperkecil tanpa mengubah fungsi */
        .app-shell { max-width: 480px; }
        .topbar { padding: 14px 14px; gap: 8px; }
        .brand { gap: 9px; }
        .logo-img { width: 44px; height: 44px; }
        .brand-title { font-size: clamp(1.15rem, 5.8vw, 1.65rem); letter-spacing: -1px; }
        .version-badge { padding: 3px 7px; border-radius: 8px; margin-left: 5px; }
        #clock { font-size: clamp(.85rem, 4.2vw, 1.05rem); padding: 8px 12px; border-radius: 10px; }
        .content { padding: 14px 10px 0; gap: 12px; }
        .glass-card { border-radius: 16px; }
        .select-card, .pen-card, .input-card { padding: 12px; }
        .select-card { gap: 10px; }
        .select-wrap { min-height: 60px; grid-template-columns: 34px 1fr 18px; padding: 7px 9px; border-radius: 10px; }
        .select-icon { font-size: 20px; }
        .select-label { font-size: .62rem; margin-bottom: 3px; }
        .neo-input { font-size: .95rem; }
        .arrow { border-left-width: 6px; border-right-width: 6px; border-top-width: 7px; }
        .section-head { margin-bottom: 10px; }
        .section-title { font-size: 1.05rem; }
        #pCount { min-width: 54px; padding: 5px 9px; border-radius: 8px; font-size: .95rem; }
        #pCon { grid-template-columns: repeat(3, minmax(0,1fr)); gap: 8px; }
        .pen-box { min-height: 62px; border-radius: 10px; }
        .pen-number { font-size: 1.3rem; }
        .pen-name { margin-top: 3px; font-size: .68rem; }
        .pen-status { display: none; }
        .legend { gap: 7px 10px; margin-top: 10px; font-size: .65rem; }
        .legend span::before { width: 12px; height: 12px; margin-right: 5px; vertical-align: -2px; }
        .target-panel { border-radius: 15px; padding: 13px 9px; }
        .target-main-title { font-size: 1.05rem; margin-bottom: 10px; }
        .target-grid { grid-template-columns: repeat(2, minmax(0,1fr)); gap: 6px; }
        .target-item { padding: 8px 5px; border-right: none; border-bottom: 1px solid rgba(255,255,255,.22); }
        .target-label { font-size: .62rem; margin-bottom: 6px; }
        .target-val { font-size: clamp(1.55rem, 10vw, 2.25rem); }
        .target-unit { margin-top: 5px; font-size: .68rem; }
        .input-head { margin-bottom: 10px; }
        .reset-btn { padding: 7px 10px; border-radius: 8px; font-size: .8rem; }
        .actual-grid { grid-template-columns: repeat(2, minmax(0,1fr)); gap: 8px; }
        .actual-box { padding: 8px; border-radius: 10px; }
        .actual-box label { font-size: .56rem; margin-bottom: 6px; }
        .actual-box input { min-height: 38px; padding: 0 9px; font-size: .9rem; border-radius: 8px; }
        .molases-total { margin-top: 10px; padding: 10px 12px; border-radius: 11px; font-size: .82rem; }
        #m-h { font-size: 1.1rem; }
        #btn { border-radius: 12px; padding: 14px; font-size: 1rem; }

        @media (max-width: 360px) {
            .brand-title { font-size: 1.02rem; }
            .logo-img { width: 38px; height: 38px; }
            #clock { font-size: .78rem; padding: 7px 9px; }
            #pCon { gap: 6px; }
            .pen-box { min-height: 58px; }
            .target-val { font-size: 1.55rem; }
            .actual-grid { gap: 6px; }
        }
    </style>
</head>
<body>
    <div class="app-shell">
        <header class="topbar">
            <div class="brand">
                <img src="logo.png" alt="TMR Loader Logo" class="logo-img" onerror="this.style.display='none'">
                <h1 class="brand-title">TMR <span class="loader">LOADER</span><span class="version-badge">v11.5</span></h1>
            </div>
            <div id="clock">00:00</div>
        </header>

        <main class="content">
            <form id="tmrForm" class="grid gap-5">
                <div class="glass-card select-card">
                    <div class="select-wrap">
                        <div class="select-icon">👤</div>
                        <div>
                            <span class="select-label">Pilih Operator</span>
                            <select id="opSel" required class="neo-input"></select>
                        </div>
                        <div class="arrow"></div>
                    </div>
                    <div class="select-wrap">
                        <div class="select-icon">▣</div>
                        <div>
                            <span class="select-label">Pilih Shift</span>
                            <select id="shSel" required class="neo-input">
                                <option value="Pagi">SHIFT 1 (PAGI)</option>
                                <option value="Siang">SHIFT 2 (SIANG)</option>
                                <option value="Malam">SHIFT 3 (MALAM)</option>
                            </select>
                        </div>
                        <div class="arrow"></div>
                    </div>
                </div>

                <div class="glass-card pen-card">
                    <div class="section-head">
                        <h2 class="section-title">Pilih Pen (Maks 3)</h2>
                        <span id="pCount">0/3</span>
                    </div>
                    <div id="pCon"></div>
                    <div class="legend">
                        <span>Normal</span><span class="l-1x">1x (Selesai)</span><span class="l-2x">2x (Terkunci)</span><span class="l-off">Nonaktif</span>
                    </div>
                </div>

                <section class="target-panel">
                    <h2 class="target-main-title">Target Hari Ini</h2>
                    <div class="target-grid">
                        <div class="target-item"><span class="target-label">Sisa Pakan</span><div id="t-sisa" class="target-val">0</div><span class="target-unit">KG</span></div>
                        <div class="target-item"><span class="target-label">Odot</span><div id="t-odot" class="target-val">0</div><span class="target-unit">KG</span></div>
                        <div class="target-item"><span class="target-label">Jagung</span><div id="t-jagung" class="target-val">0</div><span class="target-unit">KG</span></div>
                        <div class="target-item"><span class="target-label">Silase</span><div id="t-silase" class="target-val">0</div><span class="target-unit">KG</span></div>
                        <div class="target-item"><span class="target-label">Konsentrat</span><div id="t-kon" class="target-val">0</div><span class="target-unit">KG</span></div>
                    </div>
                </section>

                <section class="glass-card input-card">
                    <div class="input-head">
                        <h2 class="section-title text-emerald-700">Input Aktual</h2>
                        <button type="button" class="reset-btn" onclick="resetInputs()">⟳ Reset</button>
                    </div>
                    <div class="actual-grid">
                        <div class="actual-box"><label>Aktual Sisa Pakan (KG)</label><input type="number" id="a-sisa" placeholder="0"></div>
                        <div class="actual-box"><label>Aktual Odot (KG)</label><input type="number" id="a-odot" placeholder="0"></div>
                        <div class="actual-box"><label>Aktual Jagung (KG)</label><input type="number" id="a-jagung" placeholder="0"></div>
                        <div class="actual-box"><label>Aktual Silase (KG)</label><input type="number" id="a-silase" placeholder="0"></div>
                        <div class="actual-box"><label>Aktual Konsentrat (KG)</label><input type="number" id="a-kon" placeholder="0"></div>
                        <div class="actual-box"><label>Molases Awal (KG)</label><input type="number" id="m-s" placeholder="0"></div>
                        <div class="actual-box"><label>Molases Akhir (KG)</label><input type="number" id="m-a" placeholder="0"></div>
                    </div>
                    <div class="molases-total"><span>Total Molases KG</span><span id="m-h">0</span></div>
                </section>

                <button type="submit" id="btn">➤ SUBMIT & SIMPAN DATA</button>
            </form>
        </main>
    </div>

    <script>
        const URL = "https://script.google.com/macros/s/AKfycbzI0mEdtG8UY77vhwfbpqE9K99f-9AM83pl-aDDRPKHg0qbQougyqTooUk8DJCNdTYU/exec"; 
        let DB = null;

        async function init() {
            const res = await fetch(URL);
            DB = await res.json();

            const op = document.getElementById('opSel');
            op.innerHTML = '<option disabled selected>-- Pilih Operator --</option>';

            DB.users.forEach(u => op.innerHTML += `<option value="${u}">${u}</option>`);
            render();
        }

        function render() {
            const sh = document.getElementById('shSel').value;
            const con = document.getElementById('pCon');
            con.innerHTML = '';

            DB.pens.forEach((p, idx) => {
                let cnt = 0;

                if (DB.history) {
                    DB.history.forEach(h => {
                        if (h.shift === sh && h.pens.includes(p)) cnt++;
                    });
                }

                let sClass = cnt === 1 ? "pen-done-1x" : (cnt >= 2 ? "pen-locked-2x" : "pen-normal");
                let sLabel = cnt === 1 ? 'TERISI 1x' : (cnt >= 2 ? 'TERKUNCI 2x' : 'NORMAL');
                let dis = cnt >= 2;

                const lbl = document.createElement('label');
                lbl.className = `pen-box ${sClass} ${dis ? 'pointer-events-none' : ''}`;
                lbl.innerHTML = `
                    <input type="checkbox" value="${p}" ${dis ? 'disabled' : ''} class="pen-cb">
                    <div class="pen-number">${idx + 1}</div>
                    <div class="pen-name">${p}</div>
                    <div class="pen-status">${sLabel}</div>
                `;

                lbl.querySelector('input').addEventListener('change', handleSelection);
                con.appendChild(lbl);
            });
        }

        function handleSelection() {
            const selCount = document.querySelectorAll('.pen-cb:checked').length;
            const allCbs = document.querySelectorAll('.pen-cb');

            document.getElementById('pCount').innerText = selCount + "/3";

            allCbs.forEach(cb => {
                if (selCount >= 3 && !cb.checked) {
                    cb.disabled = true;
                    cb.parentElement.classList.add('pen-disabled-limit');
                } else { 
                    let pName = cb.value;
                    let sh = document.getElementById('shSel').value;
                    let hCnt = 0;

                    if (DB.history) {
                        DB.history.forEach(h => {
                            if (h.shift === sh && h.pens.includes(pName)) hCnt++;
                        });
                    }

                    if (hCnt < 2) {
                        cb.disabled = false;
                        cb.parentElement.classList.remove('pen-disabled-limit');
                    }
                }
            });

            calc();
        }

        function calc() {
            const sh = document.getElementById('shSel').value;
            const sel = Array.from(document.querySelectorAll('.pen-cb:checked')).map(c => c.value);

            let t = { s:0, o:0, j:0, si:0, k:0 };

            if (DB.targets && sel.length > 0) {
                let row = -1;

                for (let i = 0; i < DB.targets.length; i++) {
                    if (DB.targets[i][0] === sh) {
                        row = i;
                        break;
                    }
                }

                if (row !== -1) {
                    sel.forEach(p => {
                        for (let j = row + 1; j < DB.targets.length; j++) { 
                            if (DB.targets[j][0] === p) {
                                t.s += parseFloat(DB.targets[j][1]) || 0;
                                t.o += parseFloat(DB.targets[j][2]) || 0;
                                t.j += parseFloat(DB.targets[j][3]) || 0;
                                t.si += parseFloat(DB.targets[j][4]) || 0;
                                t.k += parseFloat(DB.targets[j][5]) || 0;
                                break;
                            }

                            if (["Pagi","Siang","Malam"].includes(DB.targets[j][0])) break; 
                        }
                    });
                }
            }

            ['t-sisa','t-odot','t-jagung','t-silase','t-kon'].forEach((id, i) => {
                document.getElementById(id).innerText = Math.round(Object.values(t)[i]).toLocaleString('id-ID');
            });
        }

        document.getElementById('m-s').oninput = document.getElementById('m-a').oninput = () => {
            let r = (parseFloat(document.getElementById('m-a').value) || 0) - (parseFloat(document.getElementById('m-s').value) || 0);
            document.getElementById('m-h').innerText = r > 0 ? Math.round(r).toLocaleString('id-ID') : 0;
        };

        function resetInputs() {
            ['a-sisa','a-odot','a-jagung','a-silase','a-kon','m-s','m-a'].forEach(id => document.getElementById(id).value = '');
            document.getElementById('m-h').innerText = '0';
        }

        document.getElementById('tmrForm').onsubmit = async (e) => {
            e.preventDefault();

            const b = document.getElementById('btn');
            const sel = Array.from(document.querySelectorAll('.pen-cb:checked')).map(c => c.value);

            if (sel.length === 0) return alert("Pilih minimal 1 PEN!");

            b.disabled = true;
            b.innerText = "SEDANG MENYIMPAN...";

            const p = {
                formType: "loader",
                operator: document.getElementById('opSel').value,
                shift: document.getElementById('shSel').value,
                pens: sel,
                aktual: {
                    sisa: document.getElementById('a-sisa').value,
                    odot: document.getElementById('a-odot').value,
                    jagung: document.getElementById('a-jagung').value,
                    silase: document.getElementById('a-silase').value,
                    konsentrat: document.getElementById('a-kon').value
                },
                molases: {
                    sebelum: document.getElementById('m-s').value,
                    akhir: document.getElementById('m-a').value,
                    total: document.getElementById('m-h').innerText
                }
            };

            await fetch(URL, {
                method: 'POST',
                body: JSON.stringify(p)
            });

            alert("BERHASIL!");
            location.reload();
        };

        setInterval(() => {
            document.getElementById('clock').innerText =
                new Date().toLocaleTimeString('id-ID', {
                    hour:'2-digit',
                    minute:'2-digit'
                }).replace(':', '.');
        }, 1000);

        document.getElementById('shSel').addEventListener('change', render);
        window.onload = init;
    </script>
</body>
</html>
